# Prod environment — triggered on PRs to `main` and merges into `main`
#
# Flow:
#   dev → PR → main   : plan + PR comment
#   merge → main      : plan → wait for manual approval → apply
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   AWS_ROLE_ARN  — IAM role ARN for prod (trusted by GitHub OIDC)
#
# Manual approval gate:
#   Settings → Environments → prod → Required reviewers (add at least 1 senior engineer)
#   Settings → Environments → prod → Deployment branches → main only (recommended)

name: Terraform · Prod

on:
  push:
    branches:
      - main
    paths:
      - "environments/prod/**"
      - "modules/**"
      - ".github/workflows/_terraform.yml"
      - ".github/workflows/terraform-prod.yml"

  pull_request:
    branches:
      - main
    paths:
      - "environments/prod/**"
      - "modules/**"
      - ".github/workflows/_terraform.yml"
      - ".github/workflows/terraform-prod.yml"

permissions:
  id-token: write        # OIDC token exchange (passed down to reusable workflow)
  contents: read         # checkout
  pull-requests: write   # post plan comments on PRs
  security-events: write # upload Checkov SARIF to GitHub Code Scanning

jobs:
  terraform:
    name: Prod
    uses: ./.github/workflows/_terraform.yml
    with:
      environment: prod
      working_directory: environments/prod
      aws_region: ap-southeast-1
      terraform_version: "1.9.0"
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
