# Reusable Terraform workflow — called by terraform-dev.yml and terraform-prod.yml
# Handles: fmt → init → validate → checkov → plan (on PR) → apply (on merge)

name: Terraform (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        required: true
        type: string
      working_directory:
        description: "Path to the Terraform root module"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: true
        type: string
      terraform_version:
        description: "Terraform CLI version"
        required: false
        type: string
        default: "1.9.0"
    secrets:
      aws_role_arn:
        description: "IAM Role ARN to assume via OIDC"
        required: true

# One active run per environment — queue new, cancel superseded runs
concurrency:
  group: terraform-${{ inputs.environment }}
  cancel-in-progress: false   # never cancel an in-flight apply

jobs:
  terraform:
    name: "${{ inputs.environment }} · ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}"
    runs-on: ubuntu-latest

    # Maps to a GitHub Environment (configure protection rules / required reviewers there)
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    permissions:
      id-token: write        # OIDC token exchange
      contents: read         # checkout
      pull-requests: write   # post plan comments
      security-events: write # upload Checkov SARIF to GitHub Code Scanning

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. AWS credentials via OIDC (no long-lived keys) ──────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: github-actions-terraform-${{ inputs.environment }}

      # ── 3. Terraform CLI ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: true   # wraps CLI so outputs are captured

      # ── 4. Format check ────────────────────────────────────────────────────
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true   # report outcome; hard-fail below after comment

      # ── 5. Init ────────────────────────────────────────────────────────────
      - name: Terraform Init
        id: init
        run: terraform init -input=false

      # ── 6. Validate ────────────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── 7. Checkov security scan ───────────────────────────────────────────
      # Runs after init so downloaded modules are also scanned.
      # Produces SARIF report visible in GitHub Security → Code Scanning.
      # To skip specific checks: add `--skip-check CKV_AWS_xxx,CKV_AWS_yyy`
      - name: Checkov Security Scan
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ inputs.working_directory }}
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false   # hard fail — blocks plan/apply if HIGH/CRITICAL issues found
        continue-on-error: true   # let SARIF upload & PR comment run before failing

      - name: Upload Checkov SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # upload even when checkov finds issues
        with:
          sarif_file: results.sarif
          category: checkov-${{ inputs.environment }}

      # ── 8a. Plan (PR only) ─────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      # ── 8b. Post plan as PR comment ────────────────────────────────────────
      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
        with:
          script: |
            const MAX_LEN = 60000;  // GitHub comment character limit safety margin

            const icon = (outcome) => ({ success: '✅', failure: '❌', cancelled: '⚠️' }[outcome] ?? '➖');

            let plan = process.env.PLAN_STDOUT || process.env.PLAN_STDERR || '(no output)';
            if (plan.length > MAX_LEN) {
              plan = plan.substring(0, MAX_LEN) + '\n\n... output truncated (see Actions log for full output)';
            }

            const body = [
              `## Terraform Plan · \`${{ inputs.environment }}\``,
              '',
              `| Step | Outcome |`,
              `|------|---------|`,
              `| 🖌 **fmt**      | ${icon('${{ steps.fmt.outcome }}')} \`${{ steps.fmt.outcome }}\` |`,
              `| ⚙️ **init**    | ${icon('${{ steps.init.outcome }}')} \`${{ steps.init.outcome }}\` |`,
              `| 🤖 **validate**| ${icon('${{ steps.validate.outcome }}')} \`${{ steps.validate.outcome }}\` |`,
              `| 🔒 **checkov** | ${icon('${{ steps.checkov.outcome }}')} \`${{ steps.checkov.outcome }}\` |`,
              `| 📋 **plan**    | ${icon('${{ steps.plan.outcome }}')} \`${{ steps.plan.outcome }}\` |`,
              '',
              '<details><summary><b>Show Plan Output</b></summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
              '',
              `> Triggered by @${{ github.actor }} · commit \`${{ github.sha }}\``,
            ].join('\n');

            // Update existing bot comment if present, otherwise create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(`Terraform Plan · \`${{ inputs.environment }}\``)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Hard-fail assertions — run after comment so PR always gets updated
      - name: Assert checkov passed
        if: steps.checkov.outcome == 'failure'
        run: |
          echo "::error::Checkov found security issues — see GitHub Security tab (Code Scanning) for details"
          exit 1

      - name: Assert plan succeeded
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'failure'
        run: |
          echo "::error::terraform plan failed — see comment on PR for details"
          exit 1

      - name: Assert fmt passed
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::error::terraform fmt check failed — run 'terraform fmt -recursive' locally"
          exit 1

      # ── 9. Apply (merge to branch only) ────────────────────────────────────
      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
