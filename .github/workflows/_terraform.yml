# Reusable Terraform workflow — called by terraform-dev.yml and terraform-prod.yml
# Handles: fmt → init → validate → plan (on PR or push) → apply (on push, manual approval)
#
# Manual approval gate:
#   Configure the GitHub Environment (dev / prod) with required reviewers in:
#   Repository Settings → Environments → <env> → Required reviewers

name: Terraform (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        required: true
        type: string
      working_directory:
        description: "Path to the Terraform root module"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: true
        type: string
      terraform_version:
        description: "Terraform CLI version"
        required: false
        type: string
        default: "1.9.0"
    secrets:
      aws_role_arn:
        description: "IAM Role ARN to assume via OIDC"
        required: true

# One active run per environment — queue new, cancel superseded runs
concurrency:
  group: terraform-${{ inputs.environment }}
  cancel-in-progress: false   # never cancel an in-flight apply

jobs:
  # ── Job 1: Plan ─────────────────────────────────────────────────────────────
  # Runs on both PR and push. No approval gate — just plan and report.
  plan:
    name: "${{ inputs.environment }} · Plan"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    permissions:
      id-token: write        # OIDC token exchange
      contents: read         # checkout
      pull-requests: write   # post plan comments

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. AWS credentials via OIDC (no long-lived keys) ────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: github-actions-terraform-${{ inputs.environment }}

      # ── 3. Terraform CLI ─────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: true   # wraps CLI so outputs are captured for PR comments

      # ── 4. Format check ──────────────────────────────────────────────────────
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true   # report outcome; hard-fail below after comment

      # ── 5. Init ──────────────────────────────────────────────────────────────
      - name: Terraform Init
        id: init
        run: terraform init -input=false

      # ── 6. Validate ──────────────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── 7. Plan ──────────────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      # ── 8. Upload plan artifact (push only — consumed by apply job) ──────────
      - name: Upload plan artifact
        if: github.event_name == 'push' && steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

      # ── 9. Post plan as PR comment ────────────────────────────────────────────
      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
        with:
          script: |
            const MAX_LEN = 60000;  // GitHub comment character limit safety margin

            const icon = (outcome) => ({ success: '✅', failure: '❌', cancelled: '⚠️' }[outcome] ?? '➖');

            let plan = process.env.PLAN_STDOUT || process.env.PLAN_STDERR || '(no output)';
            if (plan.length > MAX_LEN) {
              plan = plan.substring(0, MAX_LEN) + '\n\n... output truncated (see Actions log for full output)';
            }

            const body = [
              `## Terraform Plan · \`${{ inputs.environment }}\``,
              '',
              `| Step | Outcome |`,
              `|------|---------|`,
              `| 🖌 **fmt**      | ${icon('${{ steps.fmt.outcome }}')} \`${{ steps.fmt.outcome }}\` |`,
              `| ⚙️ **init**    | ${icon('${{ steps.init.outcome }}')} \`${{ steps.init.outcome }}\` |`,
              `| 🤖 **validate**| ${icon('${{ steps.validate.outcome }}')} \`${{ steps.validate.outcome }}\` |`,
              `| 📋 **plan**    | ${icon('${{ steps.plan.outcome }}')} \`${{ steps.plan.outcome }}\` |`,
              '',
              '<details><summary><b>Show Plan Output</b></summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
              '',
              `> Triggered by @${{ github.actor }} · commit \`${{ github.sha }}\``,
            ].join('\n');

            // Update existing bot comment if present, otherwise create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(`Terraform Plan · \`${{ inputs.environment }}\``)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Hard-fail assertions — run after comment so PR always gets updated
      - name: Assert plan succeeded
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::terraform plan failed — see comment on PR for details"
          exit 1

      - name: Assert fmt passed
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::error::terraform fmt check failed — run 'terraform fmt -recursive' locally"
          exit 1

  # ── Job 2: Apply ─────────────────────────────────────────────────────────────
  # Runs only on push (merge). Gated by the GitHub Environment — configure
  # required reviewers in: Settings → Environments → <env> → Required reviewers
  apply:
    name: "${{ inputs.environment }} · Apply"
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push'

    # This environment gate pauses execution until a required reviewer approves.
    # Without required reviewers configured, the job proceeds immediately.
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    permissions:
      id-token: write   # OIDC token exchange
      contents: read    # checkout

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. AWS credentials via OIDC ──────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: github-actions-terraform-${{ inputs.environment }}

      # ── 3. Terraform CLI ─────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      # ── 4. Init ──────────────────────────────────────────────────────────────
      - name: Terraform Init
        run: terraform init -input=false

      # ── 5. Download plan artifact ────────────────────────────────────────────
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}

      # ── 6. Apply ─────────────────────────────────────────────────────────────
      - name: Terraform Apply
        run: terraform apply -input=false tfplan
